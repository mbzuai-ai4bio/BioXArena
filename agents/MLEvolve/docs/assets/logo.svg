<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E3A6E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2B4C8C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A6FA5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A6E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="400" height="120" fill="#FFFFFF"/>

  <!-- Search tree edges -->
  <line x1="45" y1="60" x2="20" y2="30" stroke="#A8BDD9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="45" y1="60" x2="70" y2="30" stroke="#A8BDD9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="45" y1="60" x2="20" y2="90" stroke="#A8BDD9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="45" y1="60" x2="70" y2="90" stroke="#A8BDD9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="70" y1="30" x2="95" y2="18" stroke="#A8BDD9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="70" y1="30" x2="95" y2="42" stroke="#A8BDD9" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Fusion arc -->
  <path d="M20,90 Q58,110 95,42" fill="none" stroke="#2B4C8C" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- Nodes -->
  <circle cx="45" cy="60" r="7" fill="url(#nodeGrad)"/>
  <circle cx="20" cy="30" r="5.5" fill="#4A6FA5"/>
  <circle cx="70" cy="30" r="5.5" fill="#4A6FA5"/>
  <circle cx="20" cy="90" r="5.5" fill="#4A6FA5"/>
  <circle cx="70" cy="90" r="5.5" fill="#4A6FA5"/>
  <circle cx="95" cy="18" r="5" fill="#6B8FC2"/>
  <circle cx="95" cy="42" r="5" fill="#6B8FC2"/>
  <!-- Best node highlight -->
  <circle cx="95" cy="18" r="8" fill="none" stroke="#1E3A6E" stroke-width="1.5" opacity="0.5"/>

  <!-- Text -->
  <text x="120" y="72" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="48" font-weight="700" fill="#1E3A6E" letter-spacing="-1">
    ML<tspan fill="#2B4C8C">Evolve</tspan>
  </text>
</svg>
