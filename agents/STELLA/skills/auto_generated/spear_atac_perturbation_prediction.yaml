skill_id: spear_atac_perturbation_prediction
version: 1.0.0
name: Spear-ATAC Chromatin Accessibility Perturbation Prediction
domain: genomics
description: Predicts chromatin accessibility changes following genetic perturbations
  using Ridge regression on integrated metadata and PCA-reduced genomic features.
workflow:
- step: 1
  action: execute
  description: '1. Explored data structure: train.jsonl.gz (10215 samples), test.jsonl.gz
    (3405 samples), 256 delta_accessibility targets

    2. Extracted 42 features: nFrags, nMonoFrags, nMultiFrags, TSSEnrichment, FRIP,
    NucleosomeRatio, PromoterRatio, sgCounts, sgTotal, sgSpec, pc_0 through pc_31

    3. Applied StandardScaler normalization to all features

    4. Used Ridge regression (alpha=1.0) for multi-output prediction (256 targets)

    5. Generated submission.csv with exact format matching sample_submission.csv

    6. Saved'
