skill_id: chromatin_to_expression_prediction
version: 1.0.0
name: Chromatin-to-Expression Sparse Matrix Prediction
domain: genomics
description: A pipeline for predicting gene expression levels from high-dimensional
  sparse ATAC-seq chromatin accessibility data using regression models and Pearson
  correlation validation.
workflow:
- step: 1
  action: execute
  description: '1. Data exploration: Loaded sparse ATAC-seq matrices (116,490 peaks)
    and RNA targets (2,000 genes, extract top 50)

    2. Preprocessing: TF-IDF normalization for single-cell ATAC-seq data

    3. Dimensionality reduction: TruncatedSVD (128 components) to reduce 116,490 features

    4. Model selection: Multi-output Ridge Regression for multi-target regression

    5. Validation: 10% split with Pearson correlation evaluation (achieved 0.3387)

    6. Output generation: submission.csv, metrics.json, solution.py, model_we'
  tools_required:
  - dev_agent
  - scikit-learn
  - scipy
  - pandas
  - numpy
  - joblib
