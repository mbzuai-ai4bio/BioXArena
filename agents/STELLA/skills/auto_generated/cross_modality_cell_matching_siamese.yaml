skill_id: cross_modality_cell_matching_siamese
version: 1.0.0
name: Cross-Modality Single-Cell Matching via Siamese Networks
domain: genomics
description: Integrates scRNA-seq and scATAC-seq data using SVD dimensionality reduction
  and a Siamese neural network to perform cross-modality cell alignment and matching.
workflow:
- step: 1
  action: execute
  description: '1. Data exploration: Loaded sparse matrices, understood data structure
    (9,323 training, 1,647 test, 6 candidates per test cell)

    2. Preprocessing: Applied log1p transformation and L2 normalization to handle
    high dynamic range

    3. Dimensionality reduction: Used TruncatedSVD (256 components) to reduce high-dimensional
    sparse features

    4. Model architecture: Implemented dual-encoder MLP Siamese network with shared
    512-dimensional embedding space

    5. Training: Used triplet margin loss with cosine distan'
  tools_required:
  - dev_agent
  - critic_agent
  - scipy
  - numpy
  - pandas
  - torch
  - sklearn
