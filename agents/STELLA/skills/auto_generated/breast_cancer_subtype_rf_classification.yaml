skill_id: breast_cancer_subtype_rf_classification
version: 1.0.0
name: Breast Cancer Subtype Classification via Random Forest
domain: genomics
description: A workflow for integrating clinical and gene expression data to classify
  cancer subtypes using Random Forest with automated preprocessing and class balancing.
workflow:
- step: 1
  action: execute
  description: 1. Data exploration showed 1523 training samples, 381 test samples,
    217 features (17 clinical + 200 gene expression), 7 classes with NC class having
    only 6 samples. 2. Implemented preprocessing with categorical encoding and numerical
    scaling. 3. Used Random Forest with class_weight='balanced' due to XGBoost CUDA
    compatibility issues. 4. Achieved 0.5766 mean CV macro F1 score.
