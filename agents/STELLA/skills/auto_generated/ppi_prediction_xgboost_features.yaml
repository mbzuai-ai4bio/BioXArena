skill_id: ppi_prediction_xgboost_features
version: 1.0.0
name: Protein-Protein Interaction Prediction via Feature Engineering
domain: genomics
description: A pipeline for predicting protein-protein interactions from raw amino
  acid sequences using comprehensive feature extraction and an optimized XGBoost classifier.
workflow:
- step: 1
  action: execute
  description: "1. Data exploration of HuRI dataset with 82,744 training samples\n\
    2. Feature engineering: 122 features per protein pair including:\n   - Amino acid\
    \ composition (20 AAs per protein)\n   - Physicochemical properties (hydrophobic,\
    \ polar, charged)\n   - Sequence length\n   - Interaction features: absolute differences,\
    \ element-wise products, averages\n   - Length ratios\n3. Model selection: XGBoost\
    \ with tree_method='hist' for efficiency\n4. Hyperparameters: n_estimators=300,\
    \ max_depth=7, learning_rate=0.05\n5"
