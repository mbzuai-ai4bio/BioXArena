skill_id: protein_fold_classification_multimodal
version: 1.0.0
name: Multimodal Protein Fold Classification
domain: bioinformatics
description: A pipeline for classifying protein folds into 1000+ categories by integrating
  sequence embeddings from ESM models with structural features extracted from mmCIF
  files.
workflow:
- step: 1
  action: execute
  description: "1. Data exploration: Analyzed train.csv (13,085 samples) and test.csv\
    \ (3,174 samples) with 1195 fold classes\n2. Feature engineering: \n   - Sequence\
    \ features: ESM-2 embeddings (esm2_t6_8M_UR50D, 320-dim), amino acid composition\
    \ (20 features)\n   - Structural features: Parsed mmCIF files to extract Radius\
    \ of Gyration, max dimensions, coordinate std dev (6 features)\n3. Model selection:\
    \ Multi-modal neural network combining sequence and structural features\n4. Training:\
    \ PyTorch implementation with GPU "
