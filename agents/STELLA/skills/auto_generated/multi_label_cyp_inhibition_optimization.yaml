skill_id: multi_label_cyp_inhibition_optimization
version: 1.0.0
name: Optimized Multi-Label CYP Inhibition Prediction
domain: drug_discovery
description: A workflow for predicting multi-label Cytochrome P450 inhibition using
  comprehensive molecular descriptors and automated hyperparameter optimization via
  Optuna.
workflow:
- step: 1
  action: execute
  description: 1. Initial solution had poor CYP2C19 performance (0.62 ROC-AUC). 2.
    Enhanced feature engineering with 200+ RDKit 2D descriptors and MACCS keys. 3.
    Implemented Optuna hyperparameter optimization for each CYP isoform. 4. Used ensemble
    of XGBoost and LightGBM for improved robustness. 5. Addressed class imbalance
    with dynamic scale_pos_weight. 6. Achieved improved performance across all isoforms.
  tools_required:
  - dev_agent
  - RDKit
  - pandas
  - numpy
  - scikit-learn
  - xgboost
  - lightgbm
  - optuna
