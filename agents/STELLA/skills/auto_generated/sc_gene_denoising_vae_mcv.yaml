skill_id: sc_gene_denoising_vae_mcv
version: 1.0.0
name: Single-Cell Gene Expression Denoising with VAE and MCV
domain: genomics
description: Implements a Variational Autoencoder with Softplus activation and Molecular
  Cross-Validation to denoise single-cell RNA sequencing data while ensuring non-negative
  expression values.
workflow:
- step: 1
  action: execute
  description: '1. Data exploration: Loaded H5AD files with scanpy, examined noisy
    counts in layers[''counts'']

    2. Preprocessing: Applied total count normalization (target sum 10,000) + log1p
    transformation

    3. Feature selection: Identified top 50 Highly Variable Genes (HVGs) for prediction

    4. Model architecture: Implemented Variational Autoencoder (VAE) with encoder-decoder
    structure

    5. Biological constraints: Used Softplus activation in output layer to ensure
    non-negative predictions

    6. Training strategy: Molecu'
