skill_id: protein_function_contrastive_learning
version: 1.0.0
name: BioXArena Protein-Function Contrastive Matching
domain: bioinformatics
description: A cross-modal machine learning pipeline that aligns protein sequences
  and functional text descriptions using ESM-2 and PubMedBERT encoders within a CLIP-style
  contrastive learning framework.
workflow:
- step: 1
  action: execute
  description: '1. Initial implementation had poor performance (AUC 0.5168) and incomplete
    test processing

    2. Implemented improved contrastive learning approach with InfoNCE loss

    3. Used larger ESM-2 model (esm2_t12_35M_UR50D) and PubMedBERT

    4. Full training on 865,854 samples with proper validation

    5. Complete inference on 216,464 test samples'
