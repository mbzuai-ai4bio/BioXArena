skill_id: cell_painting_morphological_classification
version: 1.0.0
name: Cell Painting Morphological Perturbation Classification
domain: chemical-biology
description: High-dimensional classification of chemical perturbations using morphological
  features extracted from Cell Painting assays. This workflow handles feature-rich
  biological datasets to map phenotypic profiles to specific compound classes.
workflow:
- step: 1
  action: execute
  description: '1. Direct delegation to dev_agent for complete implementation

    2. Data loading from CSV files in public directory

    3. Feature preprocessing and normalization for 904 morphological features

    4. Label encoding for 303 classes (302 compounds + DMSO)

    5. Model selection: Random Forest for high-dimensional tabular data

    6. Training with validation split and hyperparameter optimization

    7. Prediction generation for test set

    8. Output file generation with exact format matching

    9. Timing measurement for metri'
