version: 1.0.0
name: CRISPR Perturbation High-Dimensional Expression Prediction
domain: genomics
description: A comprehensive pipeline for processing compressed genomic JSONL data
  to predict high-dimensional (125-D) differential gene expression changes following
  CRISPR perturbations.
workflow:
- step: 1
  action: execute
  description: '1. Data exploration revealed JSONL.GZ format for train/test data

    2. Feature engineering: parsing perturbation gene names, handling compressed embeddings

    3. Multi-output regression approach for 125 target dimensions

    4. GPU-accelerated neural network training

    5. Proper chunk expansion handling (40 chunks per perturbation)

    6. Exact submission format matching with id column as {perturbation}__chunk{k}'
  tools_required:
  - pandas
