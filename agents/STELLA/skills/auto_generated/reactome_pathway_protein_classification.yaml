skill_id: reactome_pathway_protein_classification
version: 1.0.0
name: Protein Sequence and Expression-based Pathway Classification
domain: bioinformatics
description: A workflow that integrates protein sequence embeddings from ESM-2 with
  tissue-specific expression data to classify proteins into Reactome pathways using
  machine learning.
workflow:
- step: 1
  action: execute
  description: "1. Data exploration: Found train.csv, test.csv, sample_submission.csv\n\
    2. Feature engineering: ESM-2 embeddings for protein sequences (1280-dim \u2192\
    \ 256-dim PCA) + standardized expression features (10-dim)\n3. Model design: Neural\
    \ network with 266 input \u2192 512 \u2192 256 \u2192 128 \u2192 8 output layers\n\
    4. Training: CrossEntropyLoss, Adam optimizer, early stopping, GPU acceleration\n\
    5. Implementation: Complete pipeline with timing metrics, submission generation,\
    \ model saving\n6. Output files: submission.csv, metrics."
