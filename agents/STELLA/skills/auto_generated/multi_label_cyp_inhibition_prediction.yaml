skill_id: multi_label_cyp_inhibition_prediction
version: 1.0.0
name: Multi-Label CYP Inhibition Prediction with Gradient Boosting
domain: drug_discovery
description: Predicts multi-label Cytochrome P450 (CYP) inhibition profiles from SMILES
  strings by generating RDKit molecular fingerprints and training an ensemble of XGBoost
  or LightGBM models.
workflow:
- step: 1
  action: execute
  description: 1. Data exploration revealed high missingness (-1 labels) for 5 CYP
    isoforms. 2. Used RDKit to extract Morgan fingerprints (ECFP4, 2048 bits) from
    SMILES. 3. Implemented individual classifiers for each CYP isoform due to high
    missingness. 4. Used XGBoost with scale_pos_weight to handle class imbalance.
    5. 5-fold cross-validation for robust evaluation. 6. Generated probabilities for
    test set. 7. Saved submission.csv, metrics.json, solution.py, and model weights.
  tools_required:
  - dev_agent
  - RDKit
  - pandas
  - numpy
  - scikit-learn
  - xgboost
  parameters: {}
