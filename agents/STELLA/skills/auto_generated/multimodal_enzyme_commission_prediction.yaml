skill_id: multimodal_enzyme_commission_prediction
version: 1.0.0
name: Multimodal Enzyme Commission Prediction from Sequence and Structure
domain: structural_bioinformatics
description: A workflow for predicting Enzyme Commission (EC) numbers by integrating
  protein primary sequences and 3D structural data using a multi-modal neural network
  architecture.
workflow:
- step: 1
  action: execute
  description: '1. Analyzed task: multi-class classification of EC numbers (1-7) using
    sequence and 3D structure

    2. Researched state-of-the-art: ESM for sequence, geometric features for structure

    3. Designed multi-modal approach: ESM-2 embeddings + structural features from
    mmCIF

    4. Implemented neural network with weighted loss for class imbalance

    5. Trained on 4 GPUs with data parallelism

    6. Generated predictions matching exact submission format

    7. Created all required output files with proper formatting'
