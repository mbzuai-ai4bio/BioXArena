version: 1.0.0
name: Medical Visual Question Answering Model Training
domain: medical_vqa
description: Fine-tunes vision-language models like BLIP on medical imaging datasets
  to perform visual question answering and generates evaluation metrics and predictions.
workflow:
- step: 1
  action: execute
  description: '1. Analyzed the dataset and found it contains 25,913 training samples
    and 6,719 test samples.

    2. Decided to use a generative VQA model (Salesforce/blip-vqa-base) because the
    answers are open-ended and there are 4,039 unique answers.

    3. Wrote a PyTorch script to load the dataset, initialize the BLIP model and processor,
    and train it for 3 epochs using AdamW.

    4. Used a custom PyTorch Dataset to handle the image loading and text processing
    with padding and truncation.

    5. Ran the script in the backg'
