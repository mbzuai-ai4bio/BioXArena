name: RNA-Protein Interaction Binding Signal Prediction
domain: sequence
description: Trains a deep learning model using 1D CNNs and sequence embeddings to
  predict continuous eCLIP binding affinity scores from RNA sequences and genomic
  context.
workflow:
- step: 1
