name: Medical Visual Question Answering with SLAKE Dataset
domain: biomedical_ml
description: A complete workflow for training and evaluating multimodal deep learning
  models on medical imaging datasets, including image preprocessing, text tokenization,
  and performance metric calculation.
workflow:
- step: 1
  action: execute
  description: '1. Data exploration: Analyzed train.csv (5972 samples), test.csv (1060
    samples), 642 medical images. 2. Preprocessing: Image resizing/normalization,
    ClinicalBERT tokenization for medical text. 3. Model architecture: ResNet50 vision
    encoder + ClinicalBERT text encoder + MLP fusion. 4. Training: 5 epochs with cross-entropy
    loss, Adam optimizer, GPU acceleration. 5. Inference: Generated predictions for
    all test samples. 6. Output: Created submission.csv matching sample format, metrics.json
    with tim'
