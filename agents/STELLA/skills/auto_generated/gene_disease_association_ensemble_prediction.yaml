skill_id: gene_disease_association_ensemble_prediction
version: 1.0.0
name: Ensemble Gene-Disease Association Strength Prediction
domain: genomics
description: Predicts the strength of associations between genes and diseases using
  an ensemble of XGBoost and MLP neural networks validated through 5-fold cross-validation.
workflow:
- step: 1
  action: execute
  description: '1. Data exploration revealed low linear correlations (<0.03) between
    features and target, suggesting need for non-linear models

    2. Implemented ensemble approach combining XGBoost (for non-linear relationships)
    and MLP (for complex interactions)

    3. Used target encoding for categorical variables (gene_symbol, disease_name)
    due to high cardinality

    4. Scaled numerical features with StandardScaler

    5. Used 5-fold cross-validation with Pearson correlation as evaluation metric

    6. Implemented GPU acceler'
