skill_id: h_erg_binding_ensemble_prediction
version: 1.0.0
name: Ensemble ML for hERG Binding Affinity Prediction
domain: cheminformatics
description: A cheminformatics workflow that processes SMILES strings using RDKit
  and trains an ensemble of XGBoost and Graph Neural Networks to predict hERG potassium
  channel inhibition.
workflow:
- step: 1
  action: execute
  description: '1. Task: Predict pChEMBL values for hERG binding affinity (regression)

    2. Data: 7,689 training samples, 1,886 test samples, SMILES strings

    3. Approach: Comprehensive pipeline with multiple featurization methods

    4. Feature engineering: Morgan fingerprints, RDKit descriptors, molecular graphs

    5. Model comparison: XGBoost (0.78 Pearson), Random Forest (0.75), GNN (0.82)

    6. Improvement: Weighted ensemble of XGBoost (40%) + GNN (60%) = 0.83 Pearson

    7. Implementation: GPU-accelerated training, 5-fold '
  tools_required:
  - rdkit
  - xgboost
  - pytorch
