skill_id: transcriptional_response_multi_output_regression
version: 1.0.0
name: High-Dimensional Drug Transcriptional Response Prediction
domain: genomics
description: A workflow for training multi-output regression models to predict high-dimensional
  gene expression changes (5000+ dimensions) in response to drug perturbations.
workflow:
- step: 1
  action: execute
  description: '1. Data exploration of JSONL.gz files

    2. Feature engineering: categorical encoding for drug/cell_line, numerical scaling

    3. Model selection: PyTorch MLP with embeddings for multi-output regression

    4. GPU-accelerated training with 4 GPUs

    5. Prediction generation in exact submission format

    6. File saving: submission.csv, metrics.json, solution.py, model.pt

    7. Quality verification through critic evaluation

    8. Iterative improvement based on feedback'
