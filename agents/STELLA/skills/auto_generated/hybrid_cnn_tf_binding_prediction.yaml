    features (tf_name, cell_type, cre_type, chrom), normalized genomic coordinates

    3. Model design: Hybrid architecture with CNN for sequence patterns (3-layer 1D-CNN),
    embeddings for categorical features, dense classifier

    4. Training: 80/20 train/validation split, binary cross-entropy loss, Adam o'
