skill_id: enzyme_commission_prediction_ml
version: 1.0.0
name: Enzyme Commission Number Prediction via Gradient Boosting
domain: bioinformatics
description: A workflow for classifying protein sequences into Enzyme Commission (EC)
  categories using feature engineering and XGBoost classifiers. It includes data preprocessing,
  model training, evaluation, and artifact generation.
workflow:
- step: 1
  action: execute
  description: '1. Task analysis: Multi-class classification of 7 EC classes from
    protein sequences

    2. Data exploration: Found train.csv (17273 samples), test.csv (1918 samples),
    sample_submission.csv

    3. Feature engineering: Extracted amino acid composition (20 features), sequence
    length, hydrophobicity

    4. Model selection: XGBoost for tabular features with class weighting for imbalance

    5. Implementation: StandardScaler for normalization, train/validation split, macro
    F1 optimization

    6. Output generation: submis'
  tools_required:
  - pandas
  - numpy
  - scikit-learn
  - xgboost
  - joblib
  - json
  - time
  - os
