skill_id: sc_rna_seq_severity_classification
version: 1.0.0
name: Single-Cell RNA-Seq Disease Severity Classification
domain: genomics
description: A workflow for processing high-dimensional gene expression features from
  single-cell sequencing data to perform multi-class classification of disease severity
  using gradient boosting.
workflow:
- step: 1
  action: execute
  description: '1. Initial approach with PCA and LightGBM performed poorly (F1: 0.1167)

    2. Identified issues: PCA losing signal, class imbalance, GroupKFold problems

    3. Improved approach: Simple log-transform + standard scaling, Random Forest with
    class weights, XGBoost ensemble

    4. Used StratifiedKFold for validation

    5. Achieved F1: 0.3346 (3x improvement from baseline)'
  tools_required:
  - pandas
  - numpy
  - sklearn
  - xgboost
  - joblib
