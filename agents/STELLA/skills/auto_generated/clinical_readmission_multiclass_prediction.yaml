skill_id: clinical_readmission_multiclass_prediction
version: 1.0.0
name: Multiclass Clinical Readmission Prediction
domain: healthcare
description: A robust machine learning pipeline for predicting patient readmission
  categories using large-scale electronic health record (EHR) data, featuring imbalanced
  class handling and ensemble modeling.
workflow:
- step: 1
  action: execute
  description: '1. Data exploration: Identified key challenges - missing values (weight
    97% missing), ICD-9 code complexity, class imbalance (NO: ~50%, >30: ~35%, <30:
    ~15%).

    2. Preprocessing strategy: Dropped weight column, imputed other missing values,
    encoded categorical variables (one-hot for low-cardinality, target encoding for
    high-cardinality like medical_specialty).

    3. Feature engineering: Grouped ICD-9 diagnosis codes into clinical categories
    (circulatory, respiratory, etc.), created comorbidity count,'
  tools_required:
  - pandas
  - numpy
  - scikit-learn
  - xgboost
  - lightgbm
  - imbalanced-learn
  - joblib
