name: Drug MOA Prediction from Fluorescence Microscopy
domain: imaging
description: A multi-modal ResNet50 workflow for predicting drug Mechanism of Action
  (MOA) from cellular morphology in fluorescence microscopy images, including NSC
  evaluation and performance metrics.
workflow:
- step: 1
  action: execute
  description: "1. Analyzed task: Multi-modal classification with NSC evaluation challenge\n\
    2. Data exploration: 944 train, 592 test images, 696x520 RGB, 7 MOA classes, zero\
    \ compound overlap\n3. Designed multi-modal architecture: ResNet50 for images\
    \ + embedding/MLP for tabular features\n4. Key considerations: \n   - NSC evaluation\
    \ requires learning morphology, not compounds\n   - Class imbalance handled with\
    \ weighted loss\n   - Data augmentation for generalization\n   - Transfer learning\
    \ from ImageNet-pretrained ResNe"
