skill_id: cite_seq_cross_modality_classification
version: 1.0.0
name: CITE-seq Cross-Modality Cell Type Classification
domain: single-cell_analysis
description: A workflow for integrating RNA and ADT features from CITE-seq data to
  perform multi-modal cell type classification using ensemble learning.
workflow:
- step: 1
  action: execute
  description: '1. Task analysis: 27-class classification with 5,000 RNA + 228 ADT
    features

    2. Data exploration: Loaded train.csv and test.csv from public directory

    3. Domain-specific preprocessing: log1p for RNA counts, arcsinh/5 for ADT cytometry
    data

    4. Dimensionality reduction: PCA to reduce RNA features from 5000 to 500 components

    5. Feature scaling: StandardScaler applied to both modalities

    6. Model training: XGBoost with multi-class objective and class weighting for
    imbalance

    7. Prediction generation: Cr'
  tools_required:
  - pandas
  - numpy
  - scikit-learn
  - xgboost
  - joblib
