skill_id: herg_prediction_ensemble_ml
version: 1.0.0
name: hERG Binding Prediction with Ensemble ML
domain: cheminformatics
description: Predicts hERG potassium channel inhibition using RDKit molecular fingerprints
  and an ensemble of machine learning models like XGBoost and Scikit-learn. This workflow
  automates feature extraction from SMILES and optimizes predictive performance for
  cardiotoxicity screening.
workflow:
- step: 1
  action: execute
  description: 1. Started with simple features (0.68 Pearson). 2. Installed RDKit
    via pip. 3. Implemented Morgan fingerprints and RDKit descriptors. 4. Used RandomForest
    (0.76 Pearson) and XGBoost (0.78 Pearson). 5. Created ensemble achieving 0.79
    Pearson correlation. 6. All files saved correctly.
  tools_required:
