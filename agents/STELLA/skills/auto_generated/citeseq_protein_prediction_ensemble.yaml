skill_id: citeseq_protein_prediction_ensemble
version: 1.0.0
name: CITE-seq Protein Abundance Prediction via Ensemble Learning
domain: genomics
description: Predicts surface protein (ADT) levels from single-cell RNA expression
  data using an ensemble of Multi-Layer Perceptrons and LightGBM models to capture
  both linear and non-linear biological relationships.
workflow:
- step: 1
  action: execute
  description: '1. Data exploration: Loaded sparse RNA and ADT matrices, checked dimensions
    (76,161 train, 14,100 test, 2000 RNA features, 134 ADT targets)

    2. Preprocessing: Applied CLR normalization to ADT targets, log1p transformation
    to RNA counts, Truncated SVD (128 components) for dimensionality reduction

    3. Model selection: Implemented ensemble of Deep MLP (1024-512-256) and LightGBM
    multi-output regressor

    4. Training: Used 3-fold cross-validation, AdamW optimizer with ReduceLROnPlateau
    for MLP, optimized'
  tools_required:
  - dev_agent
  - torch
  - scikit-learn
  - lightgbm
  - numpy
  - pandas
  - scipy
