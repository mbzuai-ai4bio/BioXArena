skill_id: gpcr_multiclass_binding_classification
version: 1.0.0
name: GPCR Binding Multi-Class Classification Pipeline
domain: cheminformatics
description: A high-performance machine learning workflow for classifying GPCR binding
  affinity using SMILES strings and pChEMBL values, optimized with GPU-accelerated
  XGBoost.
workflow:
- step: 1
  action: execute
  description: '1. Data exploration: 4,520 training samples, 3 classes (Class_A 59.7%,
    Class_B 21.2%, Class_C 19.1%), imbalanced distribution.

    2. Feature engineering: ECFP4 fingerprints (2048 bits), MACCS keys (167 bits),
    molecular descriptors (MW, LogP, TPSA, etc.), pChEMBL values, one-hot encoded
    assay types.

    3. Model selection: XGBoost with GPU acceleration, class weighting for imbalance
    handling, multi:softprob objective.

    4. Validation: 5-fold stratified cross-validation with Macro F1 score optimization.

    5.'
