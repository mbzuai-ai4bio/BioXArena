skill_id: drug_transcriptional_response_mlp
version: 1.0.0
name: High-Dimensional Drug Response Prediction via MLP
domain: genomics
description: A genomics pipeline for predicting high-dimensional transcriptional changes
  in response to drug perturbations using Multi-Layer Perceptrons.
workflow:
- step: 1
  action: execute
  description: '1. Data exploration: Found train.jsonl.gz, test.jsonl.gz, sample_submission.csv

    2. Data preprocessing: One-hot encoding for categorical features (perturbation,
    cell_line), handling missing mean_expression in test set using control averages

    3. Model selection: Multi-output MLP with 2048-1024 architecture, BatchNorm, Dropout

    4. Training: 20 epochs, MSE loss, Adam optimizer, validation split

    5. Evaluation: Pearson correlation ~0.06, validation MSE ~0.0015

    6. Output generation: Created submission.cs'
