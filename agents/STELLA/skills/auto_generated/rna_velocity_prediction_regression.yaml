skill_id: rna_velocity_prediction_regression
version: 1.0.0
name: Multi-Output RNA Velocity Prediction
domain: genomics
description: Predicts unspliced RNA transcript counts from spliced RNA data using
  multi-output regression models to model cellular differentiation and kinetics.
workflow:
- step: 1
  action: execute
  description: '1. Data exploration: Analyzed JSONL.gz files with spliced/unspliced
    counts. 2. Preprocessing: Applied log1p transformation to handle sparse scRNA-seq
    data. 3. Model selection: Multi-output MLP with 2000 input, 1024 hidden layers,
    2000 output. 4. Training: Split train data, used MSE loss, Adam optimizer. 5.
    Evaluation: Mean Pearson Correlation metric. 6. Prediction: Generated submission.csv
    with delta_0 to delta_1999 columns.'
