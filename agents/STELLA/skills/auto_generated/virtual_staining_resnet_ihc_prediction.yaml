version: 1.0.0
name: Virtual IHC Staining and Ratio Prediction via ResNet Features
domain: imaging
description: A workflow for predicting immunohistochemistry (IHC) positive ratios
  by extracting features from virtual staining images using pre-trained ResNet architectures
  integrated with tabular metadata.
workflow:
- step: 1
  action: execute
  description: '1. Created baseline metadata-only model (RandomForest on stain type
    + coordinates)

    2. Critic identified need for image features

    3. Implemented improved solution with pre-trained ResNet18 for feature extraction

    4. Used GPU acceleration for feature extraction

    5. Combined image features (PCA-reduced) with metadata

    6. Trained RandomForest on combined features

    7. Achieved improved validation MSE (0.0078 vs 0.012 baseline)

    8. Generated proper submission with all required files'
