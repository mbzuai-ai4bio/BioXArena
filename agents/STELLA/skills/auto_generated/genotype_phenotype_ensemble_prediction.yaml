skill_id: genotype_phenotype_ensemble_prediction
version: 1.0.0
name: Ensemble Genotype-to-Phenotype Expression Prediction
domain: genomics
description: Predicts gene expression levels by ensembling XGBoost and Neural Networks
  using genotype principal components, demographic factors, and context-specific expression
  data.
workflow:
- step: 1
  action: execute
  description: '1. Data exploration revealed 7,848 training samples, 1,962 test samples,
    10 target genes, 20 genotype PCs, 10 context gene expressions with ~10% missing
    values.

    2. Preprocessing: Mean imputation for missing context values, label encoding for
    categorical features (sex, target_gene), feature engineering (geno_sum, context_nan_count,
    context_avg), standard scaling.

    3. Model selection: Ensemble of XGBoost (GPU-accelerated) and 4-layer DNN with
    BatchNorm, SiLU activations, Dropout.

    4. Training: 5-fol'
