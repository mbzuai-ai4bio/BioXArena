skill_id: genomic_sequence_tissue_expression_prediction
version: 1.0.0
name: DNA Sequence-to-Tissue Expression Modeling
domain: genomics
description: A workflow for training deep learning models to predict tissue-specific
  gene expression levels directly from raw DNA sequences using PyTorch and genomic
  data processing libraries.
workflow:
- step: 1
  action: execute
  description: 'Approach:

    1. Used multimodal architecture combining DNA sequence encoders and tissue embeddings

    2. Processed promoter sequences with CNN, cDNA sequences with Transformer

    3. Used attention-based feature fusion

    4. Trained with MSE loss and Pearson correlation validation

    5. Implemented proper data split by gene (not tissue)

    6. Used GPU acceleration with PyTorch DataParallel

    7. Generated all required output files'
