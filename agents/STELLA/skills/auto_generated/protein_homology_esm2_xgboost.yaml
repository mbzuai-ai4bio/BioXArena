skill_id: protein_homology_esm2_xgboost
version: 1.0.0
name: Remote Homology Prediction via ESM-2 and XGBoost
domain: bioinformatics
description: Predicts protein structural similarity (TM-score) by extracting high-dimensional
  embeddings from ESM-2 language models and training an XGBoost regression model.
workflow:
- step: 1
  action: execute
  description: '1. Data exploration: Found 80,000 training pairs, 20,000 test pairs,
    601,328 FASTA sequences

    2. ID mapping: CSV IDs (e.g., ''3uebF00'') mapped to FASTA IDs (e.g., ''cath|4_4_0|3uebF00/0-153'')

    3. Feature extraction: Used ESM-2 (esm2_t33_650M_UR50D) for 1280-dimensional protein
    embeddings

    4. Feature engineering: Concatenated embeddings + cosine similarity + sequence
    length ratio + Euclidean distance

    5. Model selection: Compared neural network vs XGBoost, XGBoost performed better
    (Spearman 0.74)

    6. Tr'
