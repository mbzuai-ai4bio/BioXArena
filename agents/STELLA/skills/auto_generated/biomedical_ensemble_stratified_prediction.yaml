name: Stratified Ensemble Gradient Boosting for Biomedical Datasets
domain: biomedical_ml
description: A workflow for predicting clinical outcomes from multi-site biomedical
  data using ensemble gradient boosting (XGBoost/LightGBM) with site-stratified cross-validation
  to ensure model generalization.
workflow:
