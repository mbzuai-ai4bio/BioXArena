skill_id: sc_label_projection_mlp
version: 1.0.0
name: Single-Cell Label Projection with MLP
domain: single-cell_analysis
description: A robust pipeline for projecting cell-type labels across datasets with
  batch effects using Scanpy for preprocessing and a PyTorch-based Multi-Layer Perceptron
  for classification.
workflow:
- step: 1
  action: execute
  description: '1. Data exploration: Checked directory structure and file formats

    2. Data loading: Used scanpy for H5AD files, pandas for CSV metadata

    3. Preprocessing: Log1p transformation, HVG selection (top 1000 genes), standardization

    4. Model selection: 4-layer MLP with BatchNorm and Dropout for regularization

    5. Training: AdamW optimizer with ReduceLROnPlateau scheduler, cross-entropy loss

    6. Evaluation: 94.93% validation accuracy with stratified split

    7. Output generation: Created submission.csv, metrics'
  tools_required:
  - dev_agent
  - run_shell_command
  - scanpy
  - torch
  - sklearn
  - pandas
  - numpy
