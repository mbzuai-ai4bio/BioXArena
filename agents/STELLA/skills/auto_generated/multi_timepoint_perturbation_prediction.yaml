skill_id: multi_timepoint_perturbation_prediction
version: 1.0.0
name: Multi-Timepoint Gene Expression Perturbation Prediction
domain: genomics
description: A machine learning pipeline for predicting high-dimensional gene expression
  responses to drug perturbations across multiple time points using regression models.
workflow:
- step: 1
  action: execute
  description: '1. Data exploration: Loaded JSONL.gz files with pandas, identified
    nested structure with drug, cell_line, dose, time_points, profiles

    2. Feature engineering: Created categorical embeddings for drug and cell_line,
    extracted numerical dose and time, computed baseline expression

    3. Model selection: PyTorch MLP with 2 hidden layers (1024 neurons each), BatchNorm,
    Dropout, multi-output regression for 978 genes

    4. Training strategy: MSE loss, Adam optimizer, ReduceLROnPlateau scheduler, early
    stopping'
  tools_required:
  - dev_agent
  - pandas
  - torch
  - numpy
  - sklearn
