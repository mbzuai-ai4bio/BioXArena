skill_id: tox21_molecular_toxicity_prediction
version: 1.0.0
name: Molecular Toxicity Prediction via SMILES Classification
domain: drug_discovery
description: Predicts chemical toxicity from SMILES strings using machine learning
  ensembles and cross-validation, specifically optimized for Tox21 datasets and ROC-AUC
  metrics.
workflow:
- step: 1
  action: execute
  description: 1. Explored data and found imbalanced binary classification task (16%
    positive). 2. Used RDKit to extract Morgan fingerprints (radius=2, 2048 bits)
    from SMILES strings. 3. Trained an XGBoost classifier ensemble using 5-fold Stratified
    Cross-Validation. 4. Handled class imbalance using scale_pos_weight. 5. Used GPU
    acceleration for training. 6. Generated predictions by averaging probabilities
    across folds. 7. Saved submission.csv, metrics.json, solution.py, and model weights.
  tools_required:
