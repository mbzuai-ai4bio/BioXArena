name: Single-Cell RNA-seq Cross-Batch Cell Type Classification
domain: genomics
description: A workflow for training and evaluating deep learning models to classify
  cell types across multiple heterogeneous scRNA-seq batches while mitigating batch
  effects.
workflow:
- step: 1
  action: execute
  description: '1. Data exploration: Loaded H5AD file with scanpy, analyzed batch
    distribution

