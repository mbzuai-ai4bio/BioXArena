skill_id: label_free_cell_counting_multimodal
version: 1.0.0
name: Label-Free Cell Counting with Multi-Modal Deep Learning
domain: imaging
description: Automated pipeline for training deep learning models to perform cell
  counting on label-free microscopy datasets like LIVECell using PyTorch and multi-modal
  feature integration.
workflow:
- step: 1
  action: execute
  description: '1. Data exploration: Analyzed 3,727 training and 1,512 test samples
    of 520x704 grayscale TIFF images with metadata

    2. Model design: Multi-modal architecture with ResNet18 for images and MLP for
    metadata

    3. Implementation: Created PyTorch Dataset with augmentations, used Huber loss,
    AdamW optimizer

    4. Training: Multi-GPU with DataParallel, mixed precision, early stopping

    5. Output: Generated submission.csv, metrics.json, solution.py, and model weights'
