skill_id: kinase_selectivity_ensemble_prediction
version: 1.0.0
name: Ensemble Kinase Selectivity Multi-Label Prediction
domain: chemical-biology
description: A multi-label classification workflow for predicting kinase selectivity
  from SMILES strings using an ensemble of gradient boosting (XGBoost, LightGBM) and
  Graph Neural Networks with RDKit-based feature engineering.
workflow:
- step: 1
  action: execute
  description: '1. Data exploration: 30,158 training compounds, 8 kinase targets,
    imbalanced labels

    2. Feature engineering: Morgan fingerprints (ECFP4, 2048 bits), MACCS keys (166
    bits), RDKit descriptors (208 features)

    3. Model development: Tested multiple approaches, ensemble performed best

    4. Class imbalance: Handled with class weights and probability calibration

    5. Optimization: Focused on macro ROC-AUC, used validation split

    6. Implementation: Created all required BioXArena output files

    7. GPU utilization:'
  tools_required:
  - rdkit
  - sklearn
  - xgboost
  - lightgbm
  - pytorch
  - pandas
  - numpy
