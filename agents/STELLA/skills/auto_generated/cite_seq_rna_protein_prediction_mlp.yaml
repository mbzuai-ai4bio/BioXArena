skill_id: cite_seq_rna_protein_prediction_mlp
version: 1.0.0
name: Single-Cell RNA-to-Protein Multi-Output Regression
domain: genomics
description: Predicts surface protein abundance from single-cell RNA expression data
  using a multi-output Multi-Layer Perceptron (MLP) neural network. The workflow includes
  preprocessing CITE-seq data, handling high-dimensional feature spaces, and evaluating
  performance via Pearson correlation.
workflow:
- step: 1
  action: execute
  description: '1. Data exploration: Loaded H5AD files with scanpy, checked shapes
    and distributions

    2. Preprocessing: Applied log1p transformation to RNA counts, selected top 2000
    highly variable genes, standardized features

    3. Model selection: Multi-output MLP with 2000 input features, 1024 hidden layer,
    512 hidden layer, 134 output proteins

    4. Training: Used MSE loss, Adam optimizer, batch size 512, 15 epochs

    5. Evaluation: Achieved 0.7643 Pearson correlation on validation set

    6. Output generation: Created s'
