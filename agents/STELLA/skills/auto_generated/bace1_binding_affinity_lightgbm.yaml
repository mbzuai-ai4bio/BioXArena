skill_id: bace1_binding_affinity_lightgbm
version: 1.0.0
name: BACE1 Binding Affinity Prediction with LightGBM
domain: drug_discovery
description: A machine learning pipeline for predicting BACE1 binding affinity from
  SMILES strings using RDKit molecular descriptors and LightGBM regression with cross-validation.
workflow:
- step: 1
  action: execute
  description: '1. Data Exploration: Analyzed train.csv (6,487 samples) and test.csv
    (1,622 samples) structure

    2. Feature Engineering: Generated Morgan fingerprints (ECFP4, 2048 bits) and RDKit
    2D descriptors

    3. Model Selection: Compared Random Forest, XGBoost, LightGBM, Gradient Boosting
    using 5-fold CV

    4. Model Training: Selected LightGBM with best Pearson correlation (0.8273)

    5. File Generation: Created submission.csv, metrics.json, solution.py, model.joblib

    6. Validation: Ensured file formats match sample_s'
