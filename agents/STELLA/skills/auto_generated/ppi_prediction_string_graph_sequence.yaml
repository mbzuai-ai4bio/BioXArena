skill_id: ppi_prediction_string_graph_sequence
version: 1.0.0
name: Protein-Protein Interaction Prediction with Graph and Sequence Features
domain: bioinformatics
description: A bioinformatics pipeline that integrates STRING database graph topological
  features with protein sequence data to predict interactions using Gradient Boosting
  classifiers.
workflow:
- step: 1
  action: execute
  description: '1. Data exploration revealed ~40% missing sequence data, necessitating
    heavy reliance on graph features

    2. Feature engineering: Created binary indicators for missing sequences, extracted
    amino acid composition when available

    3. Created interaction features from graph metrics (ratios, differences, sums)

    4. Evaluated multiple models: XGBoost, RandomForest, GradientBoosting, Neural
    Network

    5. Used 5-fold cross-validation with ROC-AUC scoring

    6. Selected GradientBoosting as best model (0.8992 ROC-AU'
