name: Machine Learning for hERG Binding Affinity Prediction
domain: cheminformatics
description: A workflow for predicting pChEMBL values from SMILES strings using machine
  learning models, including cross-validation and test set inference for cardiotoxicity
  assessment.
workflow:
- step: 1
  action: execute
  description: 1. Explored dataset structure and identified regression task. 2. Created
    basic SMILES feature engineering without RDKit (10 features). 3. Evaluated multiple
    models (XGBoost, Random Forest, LightGBM, CatBoost) with 5-fold CV. 4. Selected
    LightGBM as best model based on Pearson correlation. 5. Trained final model and
    generated predictions. 6. Saved submission.csv, metrics.json, solution.py, and
    model weights.
