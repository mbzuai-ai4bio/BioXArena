skill_id: donor_aware_scrna_disease_classification
version: 1.0.0
name: Donor-Aware Single-Cell RNA-seq Disease Staging
domain: genomics
description: Implements a robust ensemble modeling pipeline for classifying disease
  stages from high-dimensional single-cell transcriptomics while accounting for donor-level
  variability to prevent data leakage.
workflow:
- step: 1
  action: execute
  description: '1. Data exploration: Loaded parquet files, examined class distribution
    and donor effects

    2. Preprocessing: Applied log1p transformation to gene expression, selected top
    2000 genes by variance, one-hot encoded cell_type

    3. Validation strategy: Used GroupKFold (5 folds) by donor_id to ensure generalization
    across donors

    4. Model selection: Tried multiple approaches (RandomForest, XGBoost, Neural Networks)

    5. Final solution: Ensemble of RandomForest and MLP neural network with class
    weighting

    6. Im'
  tools_required:
  - dev_agent
  - run_shell_command
  - python_interpreter
