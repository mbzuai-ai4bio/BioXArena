skill_id: citeseq_protein_prediction
version: 1.0.0
name: CITE-seq Protein Level Prediction from RNA Expression
domain: single-cell
description: A workflow for predicting surface protein abundance from single-cell
  RNA sequencing data using deep learning models and protein language model embeddings.
workflow:
- step: 1
  action: execute
  description: '1. Data loading: CSV files and NPZ sparse matrices

    2. Preprocessing: RNA library size normalization + log1p, ADT log1p

    3. Feature engineering: ESM2 protein sequence embeddings

    4. Model: Neural network with RNA encoder + protein context

    5. Training: MSE loss, AdamW, 4 GPU DataParallel, early stopping

    6. Evaluation: Pearson correlation metric

    7. Output: Proper submission format matching sample'
  tools_required:
  - pytorch
  - numpy
  - pandas
  - scipy
  - fair-esm
