name: Protein Complex Structure Quality Prediction
domain: structure
description: A machine learning pipeline that extracts 3D coordinate features from
  JSONL/CSV data to predict the structural quality and stability of protein complexes.
workflow:
- step: 1
  action: execute
  description: '1. Task analysis: Regression predicting DockQ scores (0-1) from protein
    complex features

    2. Data exploration: CSV metadata + JSONL.gz with 3D structure data

    3. Feature engineering: Extracted geometric features, contact maps, graph features
    from kNN

    4. Model selection: Gradient boosting for structured tabular data with cross-validation

    5. Implementation: Processed JSONL records, trained regression model, generated
    predictions

    6. Output: Created submission.csv, metrics.json, solution.py, and model'
