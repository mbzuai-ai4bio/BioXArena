skill_id: metabric_molecular_subtype_classification
version: 1.0.0
name: Multi-Modal Breast Cancer Subtype Classification
domain: genomics
description: A machine learning workflow that integrates clinical data and gene expression
  profiles from the METABRIC dataset to classify breast cancer molecular subtypes.
workflow:
- step: 1
  action: execute
  description: '1. Data exploration to understand structure of 17 clinical + 200 gene
    expression features

    2. Separate preprocessing for clinical (categorical encoding, missing value handling)
    vs gene expression (normalization)

    3. Feature engineering considering multi-modal nature

    4. Model selection: Ensemble methods (XGBoost/Random Forest) or neural networks
    for 7-class classification

    5. GPU acceleration for deep learning models

    6. Macro F1 score optimization

    7. Proper file generation with submission.csv, metri'
