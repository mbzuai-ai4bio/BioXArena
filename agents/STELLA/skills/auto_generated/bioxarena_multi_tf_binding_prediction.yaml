skill_id: bioxarena_multi_tf_binding_prediction
version: 1.0.0
name: Multi-Transcription Factor Binding Prediction with Categorical Features
domain: genomics
description: Predicts binding sites for multiple transcription factors from genomic
  sequences by integrating sequence data with categorical genomic features using deep
  learning.
workflow:
- step: 1
  action: execute
  description: '1. Data exploration: Analyzed 38,124 training samples with DNA sequences
    (150-350bp), categorical features (15 TFs, 7 cell types, 5 CRE types)

    2. Feature engineering: One-hot encoding for DNA sequences (fixed 400bp), label
    encoding for categorical variables

    3. Model architecture: Hybrid CNN (2-layer Conv1D) for sequences + embedding layers
    for categorical features + combined MLP classifier

    4. Training: Binary cross-entropy loss, Adam optimizer, ReduceLROnPlateau scheduler,
    validation ROC-AUC mon'
