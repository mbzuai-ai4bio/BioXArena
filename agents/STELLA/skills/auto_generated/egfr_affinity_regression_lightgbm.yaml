skill_id: egfr_affinity_regression_lightgbm
version: 1.0.0
name: EGFR Binding Affinity Regression with LightGBM
domain: drug_discovery
description: A machine learning pipeline for predicting protein-ligand binding affinity
  from SMILES strings using RDKit molecular fingerprints and LightGBM regression.
workflow:
- step: 1
  action: execute
  description: "1. Data exploration revealed SMILES strings and pChEMBL affinity values.\
    \ 2. Feature extraction using RDKit: Morgan fingerprints (ECFP4, 2048 bits) and\
    \ 2D descriptors. 3. Data preprocessing with standardization. 4. Model comparison:\
    \ Random Forest (R\xB2 ~0.66), XGBoost (R\xB2 ~0.67), LightGBM (R\xB2 ~0.68).\
    \ 5. 5-fold cross-validation for robust evaluation. 6. Final LightGBM model trained\
    \ on full dataset."
