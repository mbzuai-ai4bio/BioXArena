name: Protein-Protein Interaction Prediction with ESM-2 and Graph Ensembles
domain: bioinformatics
description: A bioinformatics pipeline that extracts protein sequence embeddings using
  ESM-2 and combines them with graph-based features for high-accuracy PPI prediction
  using ensemble models like XGBoost.
workflow:
