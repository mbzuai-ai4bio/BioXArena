# Mat Master Playground Configuration File
# Materials science agent supporting LiteLLM and Azure, integrated with Mat MCP (Structure Generator, Science Navigator, Document Parser, DPA)
# Authentication is read from .env: LITELLM_PROXY_*, AZURE_*, DEEPSEEK_API_KEY, etc. Use ${VARIABLE_NAME} to reference in config

# ============================================
# LLM Configuration (must support litellm and azure formats)
# ============================================
# All use provider: "openai" (OpenAI-compatible interface), differentiated by base_url + model
# .env must provide: LITELLM_PROXY_API_BASE, LITELLM_PROXY_API_KEY, AZURE_API_BASE, AZURE_API_KEY
llm:
  litellm:
    provider: "openai"
    model: "azure/gpt-5-chat"
    api_key: "${LITELLM_PROXY_API_KEY}"
    base_url: "${LITELLM_PROXY_API_BASE}"
    temperature: 0.7
    max_tokens: 16384
    timeout: 60
    max_retries: 3
    retry_delay: 1.0

  azure:
    provider: "openai"
    model: "gpt-4o"
    api_key: "${AZURE_API_KEY}"
    base_url: "${AZURE_API_BASE}"
    temperature: 0.7
    max_tokens: 16384
    timeout: 60
    max_retries: 3
    retry_delay: 1.0

  # Optional: DeepSeek, provide DEEPSEEK_API_KEY in .env
  deepseek:
    provider: "deepseek"
    model: "deepseek-chat"
    api_key: "${DEEPSEEK_API_KEY}"
    base_url: "https://api.deepseek.com"
    temperature: 0.7
    max_tokens: 16384
    timeout: 60
    max_retries: 3
    retry_delay: 1.0

  default: "litellm"

# ============================================
# Multi-Agent Configuration (single agent)
# ============================================
agents:
  general:
    llm: "litellm"
    max_turns: 50
    enable_tools: true

    context:
      max_tokens: 128000
      truncation_strategy: "latest_half"
      preserve_system_messages: true
      preserve_recent_turns: 5

    system_prompt_file: "prompts/system_prompt.txt"
    user_prompt_file: "prompts/user_prompt.txt"

# ============================================
# MCP Configuration (mat_master only)
# ============================================
# path_adaptor: calculation means performing path resolution and executor/storage injection for calculation-type MCPs (aligned with _tmp/MatMaster)
# calculation_servers: only enable path adaptor for these servers
# calculation_executors: each server can configure executor (image/machine_type) and sync_tools; sync tasks use executor=null, otherwise use Bohrium executor (auth injected from .env BOHRIUM_*)
mcp:
  config_file: "mcp_config.json"
  enabled: true
  path_adaptor: "calculation"
  calculation_servers: ["mat_sg", "mat_dpa", "mat_doc"]
  # Per-server executor (image/machine_type) and sync_tools. Sync tools → executor None; others → Bohrium executor with env auth.
  calculation_executors:
    mat_sg:
      executor:
        type: "dispatcher"
        machine:
          batch_type: "OpenAPI"
          context_type: "OpenAPI"
          remote_profile:
            image_address: "registry.dp.tech/dptech/dpa-calculator:5a6b85f0"
            platform: "ali"
            machine_type: "c8_m32_1 * NVIDIA 4090"
            app_key: "agent"
        resources:
          envs: {}
      sync_tools:
        - add_hydrogens
        - generate_ordered_replicas
        - remove_solvents
        - build_bulk_structure_by_template
        - build_bulk_structure_by_wyckoff
        - make_supercell_structure
        - make_defect_structure
        - make_doped_structure
        - make_amorphous_structure
        - build_molecule_structures_from_smiles
        - add_cell_for_molecules
        - build_surface_slab
        - build_surface_adsorbate
        - build_surface_interface
        - get_structure_info
        - get_molecule_info
    mat_dpa:
      executor:
        type: "dispatcher"
        machine:
          batch_type: "OpenAPI"
          context_type: "OpenAPI"
          remote_profile:
            image_address: "registry.dp.tech/dptech/dpa-calculator:a86b37cc"
            platform: "ali"
            machine_type: "c16_m64_1 * NVIDIA 4090"
            app_key: "agent"
        resources:
          envs: {}
      sync_tools: []
    mat_doc:
      executor: null
      sync_tools: []

# ============================================
# Skills (constrain Mat tool invocation and inject meta into context)
# ============================================
skills:
  enabled: true
  skills_root: evomaster/skills

# ============================================
# Session Configuration
# ============================================
session:
  type: "local"

  local:
    working_dir: "./playground/mat_master/workspace"
    timeout: 60
    gpu_devices: null
    cpu_devices: null
    symlinks: {}

  docker:
    image: "evomaster/base:latest"
    container_name: null
    use_existing_container: null
    working_dir: "/workspace"
    memory_limit: "64g"
    cpu_limit: 16.0
    gpu_devices: "0"
    network_mode: "host"
    volumes: {"./playground/mat_master/workspace": "/workspace"}
    env_vars: {}
    auto_remove: false
    timeout: 300

# ============================================
# LLM Output and Logging
# ============================================
llm_output:
  show_in_console: true
  log_to_file: true

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: null
  console: true



