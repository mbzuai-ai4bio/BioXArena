# ============================================
# X-Master Workflow Configuration
# ============================================
xmaster:
  # Number of Agents running in parallel per stage
  agent_num: 1
  # Thread pool size
  max_workers: 1
  # Whether to enable parallelization
  parallel: false

# ============================================
# LLM Configuration
# ============================================
llm:
  openai:
    provider: "openai"
    model: "${GPT_CHAT_MODEL}"
    api_key: "${OPENAI_API_KEY}"
    base_url: "${GPT_BASE_URL}"
    temperature: 0.7
    max_tokens: 16384
    timeout: 60
    max_retries: 3
    retry_delay: 1.0

  anthropic:
    provider: "anthropic"
    model: "claude-haiku-4-5-20251001"
    api_key: "${ANTHROPIC_API_KEY}"
    base_url: "${ANTHROPIC_BASE_URL}"
    temperature: 0.7
    max_tokens: 16384
    timeout: 60
    max_retries: 3
    retry_delay: 1.0

  # Local LLM configuration example
  local_sglang:
    provider: "deepseek"
    model: "deepseek-v3.2"
    api_key: "${DEEPSEEK_API_KEY}"  # Placeholder can be used for local deployment
    base_url: "${DEEPSEEK_API_BASE}"
    temperature: 0.7
    max_tokens: 16384
    timeout: 300  
    max_retries: 3
    retry_delay: 1.0

  default: "local_sglang"


# ============================================
# Agent Configuration
# ============================================

agents:
  # SolverAgent
  solver:
    llm: "local_sglang"
    max_turns: 50
    tools:
      builtin: ["*"]
      mcp: "mcp_config.json"

    context:
      max_tokens: 128000
      truncation_strategy: "latest_half"
      preserve_system_messages: true
      preserve_recent_turns: 5

    # Prompt configuration (relative to playground/x_master/)
    system_prompt_file: "prompts/solver_prefix.txt"
    user_prompt_file: "prompts/solver_user.txt"

  critic:
    llm: "local_sglang"
    max_turns: 50
    tools:
      builtin: ["*"]
      mcp: "mcp_config.json"

    context:
      max_tokens: 128000
      truncation_strategy: "latest_half"
      preserve_system_messages: true
      preserve_recent_turns: 5

    # Prompt configuration (relative to playground/x_master/)
    system_prompt_file: "prompts/critic_prefix.txt"
    user_prompt_file: "prompts/critic_user.txt"

  rewriter:
    llm: "local_sglang"
    max_turns: 50
    tools:
      builtin: ["*"]
      mcp: "mcp_config.json"

    context:
      max_tokens: 128000
      truncation_strategy: "latest_half"
      preserve_system_messages: true
      preserve_recent_turns: 5

    # Prompt configuration (relative to playground/x_master/)
    system_prompt_file: "prompts/rewrite_prefix.txt"
    user_prompt_file: "prompts/rewrite_user.txt"

  selector:
    llm: "local_sglang"
    max_turns: 50
    tools:
      builtin: ["*"]
      mcp: "mcp_config.json"

    context:
      max_tokens: 128000
      truncation_strategy: "latest_half"
      preserve_system_messages: true
      preserve_recent_turns: 5

    # Prompt configuration (relative to playground/x_master/)
    system_prompt_file: "prompts/select_prefix.txt"
    user_prompt_file: "prompts/select_user.txt"

# ============================================
# Session Configuration
# ============================================
session:
  # Session type: local or docker
  type: "local"  # Options: "local" or "docker"

  # Local Session configuration
  local:
    working_dir: "./playground/x_master/workspace"
    timeout: 60

    # Symlink configuration (optional)
    # Symlink all files and directories from the source directory to the specified location in the workspace
    # Format: {source directory path: target path within workspace}
    # Target path is relative to the workspace
    # Example:
    # symlinks:
    #   "/data/exp_data/demo1bench/aerial-cactus-identification/prepared/public/": "input"
    symlinks: {}

  # Docker Session configuration
  docker:
    # Docker image
    image: "evomaster/base:latest"

    # Container name (None for auto-generated)
    container_name: null

    # Use existing container (if set, uses this container instead of creating a new one)
    use_existing_container: null

    # Working directory (inside container)
    working_dir: "/workspace"

    # Resource limits
    memory_limit: "64g"  # Memory limit, e.g. "4g", "8g"
    cpu_limit: 16.0      # CPU limit (number of cores)
    gpu_devices: "0"   # GPU devices, options:
                        #   - null: do not use GPU
                        #   - "all": use all GPUs
                        #   - "0": use GPU 0
                        #   - ["0", "1"]: use GPU 0 and 1

    # Network mode
    network_mode: "host"  # bridge, host, none

    # Volumes (mount local directories to container)
    # Format: {local path: container path}
    # Example:
    # volumes:
    #   "./workspace": "/workspace"
    volumes: {"./playground/x_master/workspace":"/workspace"}

    # Environment variables
    # Example:
    # env_vars:
    #   PYTHONPATH: "/workspace"
    env_vars: {}

    # Container lifecycle
    auto_remove: false   # true: auto-remove container after exit, false: keep container

    # Timeout in seconds. For long-running tasks, increase the timeout accordingly.
    timeout: 300


# ============================================
# LLM Output Display Configuration
# ============================================
llm_output:
  # Whether to display LLM output in the terminal in real-time
  show_in_console: true

  # Whether to log LLM output to file
  log_to_file: true

# ============================================
# Logging Configuration
# ============================================
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: null
  console: true


